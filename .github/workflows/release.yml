name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build swapper binaries
        run: make swapper

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            LOG=$(git log --oneline --no-decorate "$PREV_TAG..$GITHUB_REF_NAME" 2>/dev/null | grep -v "^docs:\|^chore:")
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$LOG" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "See [CHANGELOG.md](./CHANGELOG.md) for full details." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
